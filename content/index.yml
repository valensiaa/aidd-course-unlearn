faq:
  title: Frequently asked questions
  description: "Everything you need to know before your first lesson on Mentora."
  categories:
    - title: For Students
      questions:
        - label: How do I find the right teacher?
          content: |
            Browse our teachers by subject, price, language, and availability. Every teacher has a detailed profile with reviews, qualifications, and a short intro video, so you can get a feel for their style before booking. Most students find their match in just a few minutes — and if your first lesson isn't a fit, you can try another teacher at no extra cost.
        - label: What do I need for a class?
          content: |
            Just a laptop or phone with a camera, a microphone, and an internet connection. Our video classroom runs right in your browser — there's nothing to download or install. We recommend a quiet space and a pair of headphones for the best experience.
        - label: Can I reschedule or cancel a lesson?
          content: |
            Yes. You can reschedule or cancel for free up to 12 hours before your lesson. Inside that window, the lesson is charged so your teacher's time is respected. You can manage all of your upcoming lessons from your dashboard.
        - label: How much do lessons cost?
          content: |
            Teachers set their own rates, which are shown clearly on every profile — typically between $15 and $45 per hour depending on subject and experience. You only pay for the lessons you book; there are no subscriptions or hidden fees.
    - title: For Teachers
      questions:
        - label: How do I start teaching on Mentora?
          content: |
            Create a teacher profile, tell us what you teach, and set your own schedule and rates. Our team reviews every application to keep quality high. Once you're approved, students can find and book you right away.
        - label: How and when do I get paid?
          content: |
            You earn for every completed lesson, and Mentora handles all payments securely. Payouts are sent to your bank account or PayPal on a weekly basis, with a clear breakdown of every lesson in your dashboard.
        - label: Do I have to commit to set hours?
          content: |
            Not at all. You're in full control of your calendar — teach a few hours a week or build it into a full-time practice. You can update your availability anytime.
    - title: Payments & Safety
      questions:
        - label: Is it safe to learn online with a stranger?
          content: |
            Every teacher on Mentora is identity-verified and reviewed by our team before they can teach. All lessons happen inside our monitored video classroom, and student reviews keep the community honest. For under-18 learners, we recommend a parent helps set up the account.
        - label: What payment methods do you accept?
          content: |
            We accept all major credit and debit cards as well as PayPal. Payments are processed securely through Stripe, and your card details are never stored on our servers.
