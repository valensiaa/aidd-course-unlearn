howItWorks:
  title: How Mentora works
  description: "From first search to your first lesson in minutes. No subscriptions, no commitments — just learning that fits your life."
  steps:
    - icon: i-lucide-search
      title: Find your teacher
      description: "Browse vetted teachers by subject, price, language, and availability. Read real reviews and watch intro videos to find your match."
    - icon: i-lucide-calendar-check
      title: Book a time that works
      description: "Pick a slot from your teacher's live calendar. Reschedule for free up to 12 hours before — life happens, and that's okay."
    - icon: i-lucide-video
      title: Join your live class
      description: "Meet face-to-face in our built-in video classroom — no downloads, no links to chase. Share screens, notes, and a whiteboard in real time."
    - icon: i-lucide-trending-up
      title: Track your progress
      description: "Set goals with your teacher, review lesson notes, and watch yourself improve session after session."
